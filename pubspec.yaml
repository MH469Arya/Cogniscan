name: cogniscan
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.1
  riverpod: ^3.2.1
  fl_chart: ^1.2.0
  shared_preferences: ^2.5.5
  flutter_animate: ^4.5.2
  permission_handler: ^11.3.1
  record: 5.0.0
  path_provider: ^2.1.3
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  record_platform_interface: 1.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/game1/
    - assets/images/game2/
    - assets/images/bg/
